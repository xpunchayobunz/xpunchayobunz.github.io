<!DOCTYPE html>
<html>
<head>
  <title>🐔 The Cozy Coop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin:0;
      font-family: 'Nunito', sans-serif;
      background: #fdfaf6;
    }

    #map { height: 100vh; }

    .title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff8f0;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 1000;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.6;
    }

    #picker {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff8f0;
      padding: 12px;
      border-radius: 14px;
      z-index: 1000;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    #picker img {
      width: 42px;
      margin: 6px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #picker img:hover {
      transform: scale(1.2) rotate(-3deg);
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 10px;
      background: #ffd6a5;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    button:hover { background: #ffbe7a; }

    /* ✍️ Popup */
    .leaflet-popup-content {
      font-family: 'Patrick Hand', cursive;
      font-size: 16px;
    }

    .leaflet-popup-content-wrapper {
      background: #fff8ff;
      border-radius: 14px;
    }

    .leaflet-popup-tip {
      background: #fff8ff;
    }

    /* 🌸 Welcome */
    #welcome {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(200, 180, 255, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #welcome.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .welcome-box {
      background: #efe4ff;
      padding: 28px;
      border-radius: 22px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .welcome-main {
      font-family: 'Patrick Hand', cursive;
      font-size: 24px;
      color: #6b4fd6;
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-family: 'Patrick Hand', cursive;
      font-size: 20px;
      color: #6b4fd6;
      margin-bottom: 14px;
    }

    .welcome-text {
      font-size: 14px;
      line-height: 1.7;
      color: #444;
    }

    .welcome-icons {
      margin-top: 10px;
      font-size: 16px;
      letter-spacing: 6px;
      opacity: 0.8;
    }

    .welcome-sign {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.7;
    }

    .welcome-box button {
      margin-top: 15px;
      background: #c4a7ff;
      border-radius: 12px;
    }

    .welcome-box button:hover {
      background: #b08cff;
    }

    /* ✨ sparkle */
    .sparkle {
      display: inline-block;
      animation: twinkle 1.5s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.6; transform: scale(1); }
      to { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>

<body>

<!-- 🌸 Welcome -->
<div id="welcome">
  <div class="welcome-box">

    <div class="welcome-main">
      <span class="sparkle">✨</span> Welcome <span class="sparkle">✨</span>
    </div>

    <div class="welcome-sub">
      to my little chicken map
    </div>

    <div class="welcome-text">
      click anywhere to drop your chicken on the map<br><br>
      pick your favourite and leave a little message
    </div>

    <div class="welcome-icons">
      🌍 💜
    </div>

    <div class="welcome-sign">
      — xPUNCHAYOBUNZ
    </div>

    <button onclick="closeWelcome()">Start exploring</button>

  </div>
</div>

<div class="title">
  🐔 The Cozy Coop
  <div class="subtitle">by xPUNCHAYOBUNZ</div>
</div>

<div id="map"></div>

<div id="picker">
  <p>Choose your chicken 🐔</p>
  <img src="https://xpunchayobunz.github.io/blue.png" onclick="selectChicken('blue')">
  <img src="https://xpunchayobunz.github.io/Green.png" onclick="selectChicken('Green')">
  <img src="https://xpunchayobunz.github.io/orange.png" onclick="selectChicken('orange')">
  <img src="https://xpunchayobunz.github.io/pink.png" onclick="selectChicken('pink')">
  <img src="https://xpunchayobunz.github.io/purple.png" onclick="selectChicken('purple')">
  <img src="https://xpunchayobunz.github.io/yellow.png" onclick="selectChicken('yellow')">

  <br>
  <button onclick="cancelSelection()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://huggjwzemgmgaojvutni.supabase.co",
  "sb_publishable_F2gIJKu5f-IcX_SAhSO_sw_XBWIkUBm"
);

const chickens = {
  blue: "https://xpunchayobunz.github.io/blue.png",
  Green: "https://xpunchayobunz.github.io/Green.png",
  orange: "https://xpunchayobunz.github.io/orange.png",
  pink: "https://xpunchayobunz.github.io/pink.png",
  purple: "https://xpunchayobunz.github.io/purple.png",
  yellow: "https://xpunchayobunz.github.io/yellow.png"
};

let selectedLocation = null;
let tempMarker = null;

const map = L.map('map', {
  worldCopyJump: false,
  maxBounds: [[-90,-180],[90,180]],
  maxBoundsViscosity: 1.0,
  minZoom: 2,
  maxZoom: 6
}).setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function createIcon(url) {
  return L.icon({
    iconUrl: url,
    iconSize: [40,40],
    iconAnchor: [20,34],
    popupAnchor: [-12,-28]
  });
}

async function loadPins() {
  const { data } = await client.from('pins').select('*');

  data.forEach(pin => {
    L.marker([pin.lat,pin.lng],{icon:createIcon(chickens[pin.chicken]||chickens.blue)})
      .addTo(map)
      .bindPopup(pin.name + (pin.message ? "<br>"+pin.message : ""));
  });
}

loadPins();

map.on('click', e => {
  selectedLocation = e.latlng;

  if (tempMarker) map.removeLayer(tempMarker);

  tempMarker = L.marker([e.latlng.lat,e.latlng.lng]).addTo(map);

  document.getElementById("picker").style.display = "block";
});

function cancelSelection(){
  selectedLocation=null;
  if(tempMarker){ map.removeLayer(tempMarker); tempMarker=null; }
  document.getElementById("picker").style.display="none";
}

async function selectChicken(color){
  const name = prompt("Your name:");
  if(!name) return;

  let message = prompt("Message (optional):") || "";

  const { error } = await client.from('pins').insert([
    { name, message, lat:selectedLocation.lat, lng:selectedLocation.lng, chicken:color }
  ]);

  if(error){ alert("Error saving"); return; }

  if(tempMarker){ map.removeLayer(tempMarker); tempMarker=null; }

  L.marker([selectedLocation.lat,selectedLocation.lng],{icon:createIcon(chickens[color])})
    .addTo(map)
    .bindPopup(name + (message ? "<br>"+message : ""))
    .openPopup();

  document.getElementById("picker").style.display="none";
}

function closeWelcome(){
  const el=document.getElementById("welcome");
  el.classList.add("hidden");
  setTimeout(()=>el.style.display="none",500);
}
</script>

</body>
</html>
