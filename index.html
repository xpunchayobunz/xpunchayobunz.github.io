<!DOCTYPE html>
<html>
<head>
  <title>🐔 Global Chicken Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Cozy font -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin:0;
      font-family: 'Quicksand', sans-serif;
      background: #fdfaf6;
    }

    #map {
      height: 100vh;
    }

    .title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff8f0;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    #picker {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff8f0;
      padding: 12px;
      border-radius: 14px;
      z-index: 1000;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    #picker img {
      width: 42px;
      margin: 6px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #picker img:hover {
      transform: scale(1.2) rotate(-3deg);
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 10px;
      background: #ffd6a5;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
    }

    button:hover {
      background: #ffbe7a;
    }

    .leaflet-popup-content {
      font-family: 'Quicksand', sans-serif;
    }

    /* 🌸 Welcome overlay */
    #welcome {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(230, 220, 255, 0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .welcome-box {
      background: #f5edff;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      max-width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .welcome-box h2 {
      margin-top: 0;
      color: #7a5cc2;
    }

    .welcome-box p {
      font-size: 14px;
      color: #555;
    }

    .welcome-box button {
      margin-top: 15px;
      background: #cdb4ff;
      border-radius: 12px;
    }

    .welcome-box button:hover {
      background: #b89cff;
    }
  </style>
</head>

<body>

<!-- 🌸 Welcome screen -->
<div id="welcome">
  <div class="welcome-box">
    <h2>🐔 Welcome!</h2>
    <p>
      Drop a little chicken roughly where you're from 🌍<br><br>
      Pick your favourite chook and leave a message if you like 💜
    </p>
    <button onclick="closeWelcome()">Start exploring</button>
  </div>
</div>

<div class="title">🐔 Global Chicken Map</div>
<div id="map"></div>

<div id="picker">
  <p>Choose your chicken 🐔</p>
  <img src="https://xpunchayobunz.github.io/blue.png" onclick="selectChicken('blue')">
  <img src="https://xpunchayobunz.github.io/Green.png" onclick="selectChicken('Green')">
  <img src="https://xpunchayobunz.github.io/orange.png" onclick="selectChicken('orange')">
  <img src="https://xpunchayobunz.github.io/pink.png" onclick="selectChicken('pink')">
  <img src="https://xpunchayobunz.github.io/purple.png" onclick="selectChicken('purple')">
  <img src="https://xpunchayobunz.github.io/yellow.png" onclick="selectChicken('yellow')">

  <br>
  <button onclick="cancelSelection()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://huggjwzemgmgaojvutni.supabase.co",
  "sb_publishable_F2gIJKu5f-IcX_SAhSO_sw_XBWIkUBm"
);

const chickens = {
  blue: "https://xpunchayobunz.github.io/blue.png",
  Green: "https://xpunchayobunz.github.io/Green.png",
  orange: "https://xpunchayobunz.github.io/orange.png",
  pink: "https://xpunchayobunz.github.io/pink.png",
  purple: "https://xpunchayobunz.github.io/purple.png",
  yellow: "https://xpunchayobunz.github.io/yellow.png"
};

let selectedLocation = null;
let tempMarker = null;

// 🌍 Locked map
const map = L.map('map', {
  worldCopyJump: false,
  maxBounds: [
    [-90, -180],
    [90, 180]
  ],
  maxBoundsViscosity: 1.0,
  minZoom: 2,
  maxZoom: 6
}).setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// Load pins
async function loadPins() {
  const { data, error } = await client.from('pins').select('*');

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(pin => {
    const iconUrl = chickens[pin.chicken] || chickens.blue;

    const customIcon = L.icon({
      iconUrl,
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });

    L.marker([pin.lat, pin.lng], { icon: customIcon }).addTo(map)
      .bindPopup(pin.name + (pin.message ? "<br>" + pin.message : ""));
  });
}

loadPins();

// Click map
map.on('click', function(e) {
  selectedLocation = e.latlng;

  if (tempMarker) {
    map.removeLayer(tempMarker);
  }

  tempMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

  document.getElementById("picker").style.display = "block";
});

// Cancel
function cancelSelection() {
  selectedLocation = null;

  if (tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
  }

  document.getElementById("picker").style.display = "none";
}

// Select chicken
async function selectChicken(color) {
  const name = prompt("Your name:");
  if (!name) return;

  let message = prompt("Message (optional):");
  if (!message) message = "";

  const lat = selectedLocation.lat;
  const lng = selectedLocation.lng;

  const { error } = await client.from('pins').insert([
    { name, message, lat, lng, chicken: color }
  ]);

  if (error) {
    alert("Error saving pin!");
    console.error(error);
    return;
  }

  if (tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
  }

  const iconUrl = chickens[color];

  const customIcon = L.icon({
    iconUrl,
    iconSize: [40, 40],
    iconAnchor: [20, 40]
  });

  L.marker([lat, lng], { icon: customIcon }).addTo(map)
    .bindPopup(name + (message ? "<br>" + message : ""))
    .openPopup();

  document.getElementById("picker").style.display = "none";
}

// Close welcome
function closeWelcome() {
  document.getElementById("welcome").style.display = "none";
}
</script>

</body>
</html>
