<!DOCTYPE html>
<html>
<head>
  <title>🐔 Chooks Across the World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin:0; font-family:'Nunito',sans-serif; background:#fdfaf6; }
    #map { height:100vh; }

    .title {
      position:absolute; top:10px; left:50%; transform:translateX(-50%);
      background:#fff8f0; padding:10px 16px; border-radius:14px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000; text-align:center;
    }

    #picker, #formBox {
      display:none;
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#fff8f0;
      padding:14px;
      border-radius:14px;
      z-index:1000;
      text-align:center;
      box-shadow:0 6px 15px rgba(0,0,0,0.15);
    }

    #picker img {
      width:42px;
      margin:6px;
      cursor:pointer;
    }

    input {
      display:block;
      margin:6px auto;
      padding:6px;
      border-radius:8px;
      border:1px solid #ddd;
      width:180px;
      font-family:'Nunito';
    }

    button {
      margin-top:8px;
      padding:6px 12px;
      border:none;
      border-radius:10px;
      background:#ffd6a5;
      cursor:pointer;
    }

    .leaflet-popup-content {
      font-family:'Patrick Hand',cursive;
      font-weight:600;
    }
  </style>
</head>

<body>

<div class="title">
  🐔 Chooks Across the World 🌍
</div>

<div id="map"></div>

<!-- 🐔 picker -->
<div id="picker">
  <p>Choose your chicken 🐔</p>
  <img src="blue.png" onclick="chooseChicken('blue')">
  <img src="Green.png" onclick="chooseChicken('Green')">
  <img src="orange.png" onclick="chooseChicken('orange')">
  <img src="pink.png" onclick="chooseChicken('pink')">
  <img src="purple.png" onclick="chooseChicken('purple')">
  <img src="yellow.png" onclick="chooseChicken('yellow')">
</div>

<!-- ✍️ form -->
<div id="formBox">
  <input id="name" placeholder="your username">
  <input id="message" placeholder="your message (optional)">
  <button onclick="submitPin()">add chook</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://huggjwzemgmgaojvutni.supabase.co",
  "sb_publishable_F2gIJKu5f-IcX_SAhSO_sw_XBWIkUBm"
);

const chickens = {
  blue:"blue.png",
  Green:"Green.png",
  orange:"orange.png",
  pink:"pink.png",
  purple:"purple.png",
  yellow:"yellow.png"
};

let selectedLocation=null;
let selectedChicken=null;

const map=L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd'
}).addTo(map);

function createIcon(url){
  return L.icon({
    iconUrl:url,
    iconSize:[40,40],
    iconAnchor:[20,34],
    popupAnchor:[-18,-28]
  });
}

function addMarker(pin){
  L.marker([pin.lat,pin.lng],{
    icon:createIcon(chickens[pin.chicken]||chickens.blue)
  }).addTo(map)
    .bindPopup(pin.name+(pin.message?"<br>"+pin.message:""));
}

async function loadPins(){
  const {data}=await client.from('pins').select('*');
  data.forEach(addMarker);
}

loadPins();


// 🌍 LIVE UPDATES
client.channel('realtime pins')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'pins'},payload=>{
    addMarker(payload.new);
  })
  .subscribe();

map.on('click',e=>{
  selectedLocation=e.latlng;
  document.getElementById("picker").style.display="block";
});

function chooseChicken(color){
  selectedChicken=color;
  document.getElementById("picker").style.display="none";
  document.getElementById("formBox").style.display="block";
}

async function submitPin(){
  const name=document.getElementById("name").value;
  const message=document.getElementById("message").value;

  if(!name) return alert("enter name!");

  await client.from('pins').insert([{
    name,
    message,
    lat:selectedLocation.lat,
    lng:selectedLocation.lng,
    chicken:selectedChicken
  }]);

  document.getElementById("formBox").style.display="none";
}
</script>

</body>
</html>
