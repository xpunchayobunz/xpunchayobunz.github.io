<!DOCTYPE html>
<html>
<head>
  <title>🐔 Global Chicken Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin:0; font-family:sans-serif; }
    #map { height: 100vh; }

    .title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: bold;
      z-index: 1000;
    }

    #picker {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      text-align: center;
    }

    #picker img {
      width: 40px;
      margin: 5px;
      cursor: pointer;
    }

    #picker img:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

<div class="title">🐔 Global Chicken Map</div>
<div id="map"></div>

<div id="picker">
  <p>Choose your chicken 🐔</p>

  <img src="https://xpunchayobunz.github.io/blue.png" onclick="selectChicken('blue')">
  <img src="https://xpunchayobunz.github.io/green.png" onclick="selectChicken('green')">
  <img src="https://xpunchayobunz.github.io/orange.png" onclick="selectChicken('orange')">
  <img src="https://xpunchayobunz.github.io/pink.png" onclick="selectChicken('pink')">
  <img src="https://xpunchayobunz.github.io/purple.png" onclick="selectChicken('purple')">
  <img src="https://xpunchayobunz.github.io/yellow.png" onclick="selectChicken('yellow')">

  <br><br>
  <button onclick="cancelSelection()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://huggjwzemgmgaojvutni.supabase.co",
  "sb_publishable_F2gIJKu5f-IcX_SAhSO_sw_XBWIkUBm"
);

const chickens = {
  blue: "https://xpunchayobunz.github.io/blue.png",
  green: "https://xpunchayobunz.github.io/green.png",
  orange: "https://xpunchayobunz.github.io/orange.png",
  pink: "https://xpunchayobunz.github.io/pink.png",
  purple: "https://xpunchayobunz.github.io/purple.png",
  yellow: "https://xpunchayobunz.github.io/yellow.png"
};

let selectedLocation = null;

// ✅ LOCKED MAP (no infinite scrolling)
const map = L.map('map', {
  worldCopyJump: false,
  maxBounds: [
    [-90, -180],
    [90, 180]
  ],
  maxBoundsViscosity: 1.0,
  minZoom: 2,
  maxZoom: 6
}).setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// Load pins
async function loadPins() {
  const { data, error } = await client.from('pins').select('*');

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(pin => {
    const iconUrl = chickens[pin.chicken] || chickens.blue;

    const customIcon = L.icon({
      iconUrl,
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });

    L.marker([pin.lat, pin.lng], { icon: customIcon }).addTo(map)
      .bindPopup("🐔 " + pin.name + "<br>" + pin.message);
  });
}

loadPins();

// Click map → show picker
map.on('click', function(e) {
  selectedLocation = e.latlng;
  document.getElementById("picker").style.display = "block";
});

// Select chicken
async function selectChicken(color) {
  const name = prompt("Your name:");
  if (!name) return;

let message = prompt("Message (optional):");
if (!message) message = "";

  const lat = selectedLocation.lat;
  const lng = selectedLocation.lng;

  const { error } = await client.from('pins').insert([
    { name, message, lat, lng, chicken: color }
  ]);

  if (error) {
    alert("Error saving pin!");
    console.error(error);
    return;
  }

  const iconUrl = chickens[color];

  const customIcon = L.icon({
    iconUrl,
    iconSize: [40, 40],
    iconAnchor: [20, 40]
  });

  L.marker([lat, lng], { icon: customIcon }).addTo(map)
    .bindPopup("🐔 " + name + "<br>" + message)
    .openPopup();

  document.getElementById("picker").style.display = "none";
}
</script>

</body>
</html>
