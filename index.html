<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://huggjwzemgmgaojvutni.supabase.co",
  "sb_publishable_F2gIJKu5f-IcX_SAhSO_sw_XBWIkUBm"
);

const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// LOAD PINS
async function loadPins() {
  const { data, error } = await supabaseClient.from('pins').select('*');

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(pin => {
    L.marker([pin.lat, pin.lng]).addTo(map)
      .bindPopup("🐔 " + pin.name + "<br>" + pin.message);
  });
}

loadPins();

// ADD PIN
map.on('click', async function(e) {
  const name = prompt("Your name:");
  if (!name) return;

  const message = prompt("Message:");
  if (!message) return;

  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  const { error } = await supabaseClient.from('pins').insert([
    { name, message, lat, lng }
  ]);

  if (error) {
    alert("Error saving pin!");
    console.error(error);
    return;
  }

  L.marker([lat, lng]).addTo(map)
    .bindPopup("🐔 " + name + "<br>" + message)
    .openPopup();
});
</script>
